# Non-secret configuration for the autopatcher run.
#
# This file is committed in the clear. Secrets (the GitHub and Anthropic
# tokens) are NOT stored here — they are provided as environment variables
# from GitHub secrets by the auto-patch workflow:
#   GITHUB_TOKEN      <- secrets.AUTOPATCHER_GITHUB_TOKEN
#   ANTHROPIC_API_KEY <- secrets.ANTHROPIC_API_KEY

# GitHub organization whose repos are scanned each run.
org: auto-patcher

# Number of repos processed simultaneously within a single run.
# Each worker runs a full Claude session — keep this low.
workers: 3

# Minimum pause between a worker finishing one job and starting the next.
worker_delay: 0s

# Repos in the org to skip.
exclude:
  - skills
