org: auto-patcher

# Number of repos processed simultaneously.
# Each worker runs a full Claude session — keep this low.
workers: 3

# How often to re-scan the org for repos that need work.
# On each scan, repos are ranked by staleness and enqueued oldest-first.
scan_interval: 15m

# Minimum pause between a worker finishing one job and starting the next.
# This spreads load over time rather than hammering repos back-to-back.
worker_delay: 10m

# Repos in the org to skip entirely (e.g. meta-repos with no upstream).
exclude:
  - skills

runner:
  # "docker" for local/single-host; "nomad" for cluster (not yet implemented).
  type: docker
  docker:
    image: ghcr.io/auto-patcher/claude-runner:latest
  nomad:
    address: http://nomad.service.consul:4646
    job_name: auto-patcher-cycle

github:
  # Name of the env var holding the GitHub PAT.
  # Secrets are managed via SOPS + Nix — the dispatcher reads from env.
  token_env: GITHUB_TOKEN

anthropic:
  api_key_env: ANTHROPIC_API_KEY
